<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimator Command Center</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <img src="./logo.png" alt="All My Sons logo" class="brand-logo" onerror="this.style.display='none';document.querySelector('.brand-mark').style.display='grid';" />
        <div class="brand-mark">AMS</div>
        <div>
          <div class="eyebrow">All My Sons</div>
          <h1>Estimator Command Center</h1>
          <p>Discounts, ROM, and appointment quality in one place</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="overview">Overview</button>
        <button class="nav-btn" data-view="discounts">Discounts</button>
        <button class="nav-btn" data-view="rom">High ROM</button>
        <button class="nav-btn" data-view="appointments">Appointments</button>
      </nav>

      <section class="panel">
        <div class="panel-title">Display Size</div>
        <div class="size-switch">
          <button class="size-btn active" data-size="compact">Compact</button>
          <button class="size-btn" data-size="standard">Standard</button>
          <button class="size-btn" data-size="large">Large</button>
        </div>
        <p class="help">Change the card and table sizing for your screen.</p>
      </section>

      <section class="panel">
        <div class="panel-title">Actions</div>
        <button id="createDiscountDrafts" class="btn btn-secondary">Create Discount Email Drafts</button>
        <p id="draftStatus" class="help"></p>
      </section>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Overview</h2>
          <p id="pageSubtitle">Snapshot of estimator performance and follow-up</p>
        </div>
        <div class="stamp" id="lastUpdated"></div>
      </header>

      <section id="view-overview" class="view active"></section>
      <section id="view-discounts" class="view"></section>
      <section id="view-rom" class="view"></section>
      <section id="view-appointments" class="view"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
