<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estimator Command Center</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">ECC</div>
        <div>
          <div class="eyebrow">All My Sons</div>
          <h1>Estimator Command Center</h1>
          <p>Cleaner dashboard for discounts, ROM, and appointments</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="overview">Overview</button>
        <button class="nav-btn" data-view="discounts">Discounts</button>
        <button class="nav-btn" data-view="rom">High ROM</button>
        <button class="nav-btn" data-view="appointments">Appointments</button>
      </nav>

      <section class="panel">
        <div class="panel-title">Connection</div>
        <p class="help">Apps Script API is hardcoded for this internal dashboard.</p>
        <p class="help">No manual setup needed for users.</p>
      </section>

      <section class="panel">
        <div class="panel-title">Actions</div>
        <button id="createDiscountDrafts" class="btn btn-secondary">Create Discount Email Drafts</button>
        <p id="draftStatus" class="help"></p>
      </section>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Overview</h2>
          <p id="pageSubtitle">Snapshot of estimator performance and operational follow-up</p>
        </div>
        <div class="stamp" id="lastUpdated"></div>
      </header>

      <section id="view-overview" class="view active"></section>
      <section id="view-discounts" class="view"></section>
      <section id="view-rom" class="view"></section>
      <section id="view-appointments" class="view"></section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
